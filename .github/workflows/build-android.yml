name: Build Android AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup EAS
        run: npm install -g eas-cli

      - name: Install dependencies
        run: npm ci

      - name: Build AAB (local)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build --platform android --profile production --local --non-interactive --output ./build/nd-player.aab

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: nd-player-release
          path: build/nd-player.aab
          retention-days: 30
